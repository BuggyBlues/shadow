name: pr-checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changed_files:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.filter.outputs.workspace }}
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
      admin: ${{ steps.filter.outputs.admin }}
      desktop: ${{ steps.filter.outputs.desktop }}
      mobile: ${{ steps.filter.outputs.mobile }}
      cloud: ${{ steps.filter.outputs.cloud }}
      website: ${{ steps.filter.outputs.website }}
      packages: ${{ steps.filter.outputs.packages }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Path filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            workspace:
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - 'apps/**'
              - 'docs/**'
              - 'packages/**'
              - 'website/**'
              - '.github/**'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'biome.json'
            server:
              - 'apps/server/**'
              - 'packages/shared/**'
              - 'packages/sdk/**'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
              - 'packages/sdk/**'
            admin:
              - 'apps/admin/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
            desktop:
              - 'apps/desktop/**'
              - 'packages/shared/**'
              - 'packages/openclaw-shadowob/**'
              - 'packages/ui/**'
              - 'packages/sdk/**'
            mobile:
              - 'apps/mobile/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
              - 'packages/sdk/**'
            cloud:
              - 'apps/cloud/**'
              - 'packages/shared/**'
              - 'packages/sdk/**'
            website:
              - 'website/**'
            packages:
              - 'packages/**'
            ci:
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - '.github/**'
              - 'docs/**'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'biome.json'

  repo_checks:
    name: Repo checks & typecheck
    runs-on: ubuntu-latest
    needs: changed_files
    if: needs.changed_files.outputs.workspace == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: i18n check
        run: pnpm check:i18n

      - name: Agent map check
        run: pnpm check:agents

      - name: SDK version check
        run: pnpm check:sdk-versions

      - name: Workspace dependency check
        run: pnpm check:workspace-deps

      - name: Export consistency check
        run: pnpm check:exports

      - name: Pre-push checks
        run: pnpm check:pre-push

      - name: Build shared packages (for typecheck)
        run: pnpm build:packages

      - name: Typecheck packages (strict)
        run: pnpm --filter "./packages/*" --parallel typecheck

      - name: Typecheck apps (report only)
        continue-on-error: true
        run: pnpm --filter "./apps/*" --parallel typecheck

  unit_tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: changed_files
    if: needs.changed_files.outputs.server == 'true' || needs.changed_files.outputs.web == 'true' || needs.changed_files.outputs.mobile == 'true' || needs.changed_files.outputs.cloud == 'true' || needs.changed_files.outputs.packages == 'true' || needs.changed_files.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run unit test lane
        run: |
          docker compose -f docker-compose.ci-unit.yml up --build --abort-on-container-exit --exit-code-from unit-tests unit-tests

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-unit.yml down -v --remove-orphans

  cli_integration:
    name: CLI integration tests
    runs-on: ubuntu-latest
    needs: changed_files
    if: needs.changed_files.outputs.packages == 'true' || needs.changed_files.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run CLI integration lane
        run: |
          docker compose -f docker-compose.ci-unit.yml up --build --abort-on-container-exit --exit-code-from cli-integration-tests cli-integration-tests

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-unit.yml down -v --remove-orphans

  cloud_cli_integration:
    name: Cloud CLI integration tests
    runs-on: ubuntu-latest
    needs: changed_files
    if: needs.changed_files.outputs.cloud == 'true' || needs.changed_files.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run cloud CLI integration lane
        run: |
          docker compose -f docker-compose.ci-unit.yml up --build --abort-on-container-exit --exit-code-from cloud-cli-integration-tests cloud-cli-integration-tests

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-unit.yml down -v --remove-orphans

  server_integration:
    name: Server integration tests
    runs-on: ubuntu-latest
    needs: changed_files
    if: needs.changed_files.outputs.server == 'true' || needs.changed_files.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run server integration lane
        shell: bash
        run: |
          docker compose -f docker-compose.ci-integration.yml up --build --abort-on-container-exit --exit-code-from server-integration-tests server-integration-tests

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-integration.yml down -v --remove-orphans

  desktop_e2e:
    name: Desktop E2E (${{ matrix.shard_id }})
    runs-on: ubuntu-latest
    needs: changed_files
    if: needs.changed_files.outputs.server == 'true' || needs.changed_files.outputs.web == 'true' || needs.changed_files.outputs.desktop == 'true' || needs.changed_files.outputs.ci == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1/2
            shard_id: 1-of-2
          - shard: 2/2
            shard_id: 2-of-2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run E2E stack
        shell: bash
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}
          JWT_SECRET: e2e-test-secret-not-for-production
          ADMIN_EMAIL: admin@shadowob.app
          ADMIN_PASSWORD: admin123456
        run: |
          docker compose -f docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e-runner e2e-runner

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-e2e-screenshots-${{ matrix.shard_id }}
          path: docs/e2e/screenshots
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-e2e-playwright-report-${{ matrix.shard_id }}
          path: |
            apps/desktop/playwright-report-web
            apps/desktop/test-results
          if-no-files-found: warn

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v --remove-orphans

  website_e2e:
    name: Website E2E
    runs-on: ubuntu-latest
    needs: changed_files
    if: needs.changed_files.outputs.website == 'true' || needs.changed_files.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run website E2E lane
        run: |
          docker compose -f docker-compose.ci-unit.yml up --build --abort-on-container-exit --exit-code-from website-e2e website-e2e

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.ci-unit.yml down -v --remove-orphans

  report:
    name: PR report comment
    needs:
      - changed_files
      - repo_checks
      - unit_tests
      - cli_integration
      - cloud_cli_integration
      - server_integration
      - desktop_e2e
      - website_e2e
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Build comment body
        id: comment
        shell: bash
        run: |
          {
            echo "## CI 检查结果"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Repo checks & typecheck | **${{ needs.repo_checks.result }}** |"
            echo "| Unit tests | **${{ needs.unit_tests.result }}** |"
            echo "| CLI integration | **${{ needs.cli_integration.result }}** |"
            echo "| Cloud CLI integration | **${{ needs.cloud_cli_integration.result }}** |"
            echo "| Server integration | **${{ needs.server_integration.result }}** |"
            echo "| Desktop E2E | **${{ needs.desktop_e2e.result }}** |"
            echo "| Website E2E | **${{ needs.website_e2e.result }}** |"
            echo ""
            echo "### 变更范围"
            echo ""
            CHANGES=""
            [[ "${{ needs.changed_files.outputs.server }}" == "true" ]] && CHANGES="${CHANGES} \`server\`"
            [[ "${{ needs.changed_files.outputs.web }}" == "true" ]] && CHANGES="${CHANGES} \`web\`"
            [[ "${{ needs.changed_files.outputs.admin }}" == "true" ]] && CHANGES="${CHANGES} \`admin\`"
            [[ "${{ needs.changed_files.outputs.desktop }}" == "true" ]] && CHANGES="${CHANGES} \`desktop\`"
            [[ "${{ needs.changed_files.outputs.mobile }}" == "true" ]] && CHANGES="${CHANGES} \`mobile\`"
            [[ "${{ needs.changed_files.outputs.cloud }}" == "true" ]] && CHANGES="${CHANGES} \`cloud\`"
            [[ "${{ needs.changed_files.outputs.website }}" == "true" ]] && CHANGES="${CHANGES} \`website\`"
            [[ "${{ needs.changed_files.outputs.packages }}" == "true" ]] && CHANGES="${CHANGES} \`packages\`"
            [[ "${{ needs.changed_files.outputs.ci }}" == "true" ]] && CHANGES="${CHANGES} \`ci/tooling\`"
            echo "Affected: ${CHANGES:-none}"
            echo ""
            echo "🔎 详情与产物："
            echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "> 注：Desktop E2E 现在按 shard 并发运行，截图和 Playwright 报告会分别作为 artifact 上传。"
          } > pr-comment.md

      - name: Upsert PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-checks-report
          path: pr-comment.md
