<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Design System - Profile</title>
  <style>
    :root {
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --primary-light: #818CF8;
      --bg: #0F0F10;
      --surface: #18181B;
      --elevated: #1F1F23;
      --border: #27272A;
      --text: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-muted: #71717A;
      --success: #22C55E;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, 'Inter', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    
    .profile {
      max-width: 360px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    
    .banner {
      height: 80px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }
    
    .avatar-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 16px;
      margin-top: -32px;
    }
    
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      background: var(--primary);
      border: 4px solid var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      position: relative;
    }
    
    .avatar-status {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      background: var(--success);
      border: 3px solid var(--surface);
      border-radius: var(--radius-full);
    }
    
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .action-btn {
      width: 36px;
      height: 36px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    .action-btn:hover {
      border-color: var(--primary);
      color: var(--text);
    }
    
    .info {
      padding: 16px;
    }
    
    .name {
      font-size: 20px;
      font-weight: 700;
    }
    
    .username {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    
    .bio {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    
    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    
    .badge {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-full);
      background: rgba(99, 102, 241, 0.15);
      color: var(--primary-light);
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    .stat { text-align: center; }
    
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    /* AI Section */
    .ai-section {
      margin: 16px;
      padding: 16px;
      background: var(--elevated);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }
    
    .ai-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .ai-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .ai-name {
      font-weight: 600;
      color: var(--primary-light);
    }
    
    .ai-desc {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .ai-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    /* Status */
    .status {
      margin: 16px;
      padding: 12px 16px;
      background: var(--elevated);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .status-emoji { font-size: 20px; }
    
    .status-text { flex: 1; }
    
    .status-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .status-value {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Profile</h1>
  
  <div class="profile">
    <div class="banner"></div>
    <div class="avatar-section">
      <div class="avatar">
        🐱
        <span class="avatar-status"></span>
      </div>
      <div class="actions">
        <button class="action-btn">💬</button>
        <button class="action-btn">⋯</button>
      </div>
    </div>
    <div class="info">
      <div class="name">彭猫</div>
      <div class="username">@happlex</div>
      <div class="bio">虾豆项目负责人<br>热爱开源与 AI</div>
      <div class="badges">
        <span class="badge">🤖 AI Creator</span>
        <span class="badge">✅ Verified</span>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value">1.2k</div>
          <div class="stat-label">关注</div>
        </div>
        <div class="stat">
          <div class="stat-value">856</div>
          <div class="stat-label">粉丝</div>
        </div>
        <div class="stat">
          <div class="stat-value">23</div>
          <div class="stat-label">社区</div>
        </div>
      </div>
    </div>
    
    <div class="status">
      <span class="status-emoji">🎧</span>
      <div class="status-text">
        <div class="status-label">状态</div>
        <div class="status-value">正在听音乐</div>
      </div>
    </div>
    
    <div class="ai-section">
      <div class="ai-header">
        <div class="ai-avatar">🤖</div>
        <div>
          <div class="ai-name">AI 分身</div>
          <div class="ai-desc">代表你参与对话</div>
        </div>
      </div>
      <div class="ai-stats">
        <span>💬 2.3k 对话</span>
        <span>⭐ 98% 好评</span>
      </div>
    </div>
  </div>
</body>
</html>
