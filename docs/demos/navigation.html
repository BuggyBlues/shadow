<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Design System - Navigation</title>
  <style>
    :root {
      --primary-500: #8B5CF6;
      --primary-600: #7C3AED;
      --accent-pink: #EC4899;
      --accent-green: #10B981;
      --accent-amber: #F59E0B;
      --accent-blue: #3B82F6;
      --gradient-brand: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
      --bg-base: #0A0A0B;
      --bg-surface: #18181B;
      --bg-elevated: #27272A;
      --bg-hover: #3F3F46;
      --border: #3F3F46;
      --text-primary: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-muted: #71717A;
      --glow-primary: 0 0 20px rgba(139, 92, 246, 0.4);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      padding: 24px;
      background: var(--gradient-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    h2 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 16px 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Desktop Layout */
    .desktop-layout {
      display: flex;
      height: 600px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin: 0 24px 24px;
    }
    
    /* Server Sidebar */
    .server-sidebar {
      width: 72px;
      background: var(--bg-surface);
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-right: 1px solid var(--border);
    }
    
    .server-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 150ms cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    
    .server-icon:hover {
      border-radius: var(--radius-lg);
      background: var(--primary-500);
    }
    
    .server-icon.active {
      border-radius: var(--radius-lg);
      background: var(--primary-500);
      box-shadow: var(--glow-primary);
    }
    
    .server-indicator {
      position: absolute;
      left: -12px;
      width: 4px;
      height: 0;
      background: var(--text-primary);
      border-radius: 0 4px 4px 0;
      transition: height 150ms;
    }
    
    .server-icon:hover .server-indicator {
      height: 20px;
    }
    
    .server-icon.active .server-indicator {
      height: 36px;
      background: var(--primary-500);
    }
    
    .server-icon.home {
      background: var(--gradient-brand);
    }
    
    .server-icon.add {
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--accent-green);
    }
    
    .server-icon.add:hover {
      border-color: var(--accent-green);
      background: rgba(16, 185, 129, 0.1);
    }
    
    .server-divider {
      width: 32px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin: 4px 0;
    }
    
    .server-unread {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 12px;
      height: 12px;
      background: var(--accent-pink);
      border-radius: var(--radius-full);
      border: 2px solid var(--bg-surface);
    }
    
    /* Channel Sidebar */
    .channel-sidebar {
      width: 240px;
      background: var(--bg-elevated);
      display: flex;
      flex-direction: column;
    }
    
    .channel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .channel-header-actions {
      display: flex;
      gap: 4px;
    }
    
    .header-btn {
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    
    .header-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .channel-category {
      margin-bottom: 16px;
    }
    
    .category-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
    }
    
    .category-header:hover {
      color: var(--text-secondary);
    }
    
    .category-header::before {
      content: '▼';
      font-size: 8px;
      transition: transform 150ms;
    }
    
    .category-header.collapsed::before {
      transform: rotate(-90deg);
    }
    
    .channel-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin: 2px 0;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 150ms;
    }
    
    .channel-item:hover {
      background: var(--bg-hover);
    }
    
    .channel-item.active {
      background: rgba(139, 92, 246, 0.2);
    }
    
    .channel-item.active .channel-name {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .channel-icon {
      font-size: 16px;
      color: var(--text-muted);
    }
    
    .channel-name {
      flex: 1;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .channel-unread {
      width: 8px;
      height: 8px;
      background: var(--text-primary);
      border-radius: var(--radius-full);
    }
    
    .channel-mention {
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: var(--accent-pink);
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .channel-item.unread .channel-name {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    /* User Panel */
    .user-panel {
      padding: 8px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--gradient-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
    }
    
    .user-status {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 10px;
      height: 10px;
      background: var(--accent-green);
      border-radius: var(--radius-full);
      border: 2px solid var(--bg-surface);
    }
    
    .user-info {
      flex: 1;
      min-width: 0;
    }
    
    .user-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .user-status-text {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .user-actions {
      display: flex;
      gap: 2px;
    }
    
    .user-btn {
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    
    .user-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
    }
    
    .main-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .main-title {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .main-title::before {
      content: '#';
      color: var(--text-muted);
    }
    
    .main-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
    }
    
    .main-body {
      flex: 1;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }
    
    /* Member Sidebar (optional) */
    .member-sidebar {
      width: 240px;
      background: var(--bg-elevated);
      border-left: 1px solid var(--border);
      padding: 16px;
    }
    
    .member-category {
      margin-bottom: 16px;
    }
    
    .member-category-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .member-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 150ms;
    }
    
    .member-item:hover {
      background: var(--bg-hover);
    }
    
    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--gradient-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      position: relative;
    }
    
    .member-status {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
      border: 2px solid var(--bg-elevated);
    }
    
    .status-online { background: var(--accent-green); }
    .status-idle { background: var(--accent-amber); }
    .status-dnd { background: #EF4444; }
    .status-offline { background: var(--text-muted); }
    
    .member-name {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .member-item.online .member-name {
      color: var(--text-primary);
    }
    
    /* Mobile Navigation */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      justify-content: space-around;
    }
    
    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 150ms;
    }
    
    .mobile-nav-item.active {
      color: var(--primary-500);
    }
    
    .mobile-nav-icon {
      font-size: 20px;
    }
    
    .mobile-nav-label {
      font-size: 11px;
    }
    
    .mobile-nav-badge {
      position: absolute;
      top: 4px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      background: var(--accent-pink);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    @media (max-width: 768px) {
      .desktop-layout {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        border-radius: 0;
        margin: 0;
      }
      
      .server-sidebar {
        display: none;
      }
      
      .channel-sidebar {
        display: none;
      }
      
      .member-sidebar {
        display: none;
      }
      
      .mobile-nav {
        display: flex;
      }
      
      .main-content {
        padding-bottom: 72px;
      }
    }
  </style>
</head>
<body>
