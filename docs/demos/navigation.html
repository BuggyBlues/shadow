<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Design System - Navigation</title>
  <style>
    :root {
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --primary-light: #818CF8;
      --bg: #0F0F10;
      --surface: #18181B;
      --elevated: #1F1F23;
      --border: #27272A;
      --border-light: #3F3F46;
      --text: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-muted: #71717A;
      --success: #22C55E;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, 'Inter', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      padding: 24px;
    }
    
    .layout {
      display: flex;
      height: 500px;
      margin: 0 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    
    /* Server sidebar */
    .servers {
      width: 72px;
      background: var(--surface);
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-right: 1px solid var(--border);
    }
    
    .server {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: var(--elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 150ms;
      position: relative;
    }
    
    .server:hover {
      border-radius: var(--radius-lg);
      background: var(--primary);
    }
    
    .server.active {
      border-radius: var(--radius-lg);
      background: var(--primary);
    }
    
    .server-indicator {
      position: absolute;
      left: -12px;
      width: 4px;
      height: 8px;
      background: var(--text);
      border-radius: 0 4px 4px 0;
      transition: height 150ms;
    }
    
    .server:hover .server-indicator { height: 20px; }
    .server.active .server-indicator { height: 36px; background: var(--primary); }
    
    .server-divider {
      width: 32px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin: 4px 0;
    }
    
    .server.add {
      background: transparent;
      border: 2px dashed var(--border);
      color: var(--success);
    }
    
    .server.add:hover {
      border-color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }
    
    /* Channel sidebar */
    .channels {
      width: 220px;
      background: var(--elevated);
      display: flex;
      flex-direction: column;
    }
    
    .channel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 15px;
    }
    
    .channel-list {
      flex: 1;
      padding: 8px;
      overflow-y: auto;
    }
    
    .category {
      margin-bottom: 16px;
    }
    
    .category-title {
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .channel {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin: 2px 0;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 150ms;
    }
    
    .channel:hover { background: var(--surface); }
    
    .channel.active { background: rgba(99, 102, 241, 0.2); }
    
    .channel-icon {
      font-size: 16px;
      color: var(--text-muted);
    }
    
    .channel-name {
      flex: 1;
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .channel.active .channel-name {
      color: var(--text);
      font-weight: 500;
    }
    
    .channel.unread .channel-name {
      color: var(--text);
    }
    
    .channel-unread {
      width: 8px;
      height: 8px;
      background: var(--text);
      border-radius: var(--radius-full);
    }
    
    .channel-badge {
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: var(--primary);
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* User panel */
    .user-panel {
      padding: 8px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
    }
    
    .user-status {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: var(--radius-full);
      border: 2px solid var(--surface);
    }
    
    .user-info { flex: 1; }
    
    .user-name {
      font-size: 13px;
      font-weight: 600;
    }
    
    .user-status-text {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .user-btns {
      display: flex;
      gap: 2px;
    }
    
    .user-btn {
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .user-btn:hover {
      background: var(--elevated);
      color: var(--text);
    }
    
    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .main-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .main-header::before {
      content: '#';
      color: var(--text-muted);
    }
    
    .main-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }
    
    /* Member sidebar */
    .members {
      width: 220px;
      background: var(--elevated);
      border-left: 1px solid var(--border);
      padding: 16px;
    }
    
    .member-category {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .member {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: var(--radius);
      cursor: pointer;
    }
    
    .member:hover { background: var(--surface); }
    
    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      position: relative;
    }
    
    .member-status {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 10px;
      height: 10px;
      border-radius: var(--radius-full);
      border: 2px solid var(--elevated);
    }
    
    .status-online { background: var(--success); }
    .status-idle { background: #EAB308; }
    .status-offline { background: var(--text-muted); }
    
    .member-name {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .member.online .member-name { color: var(--text); }
    
    /* Mobile nav */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      justify-content: space-around;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      color: var(--text-muted);
      text-decoration: none;
      position: relative;
    }
    
    .nav-item.active { color: var(--primary); }
    
    .nav-icon { font-size: 20px; }
    
    .nav-label { font-size: 11px; }
    
    .nav-badge {
      position: absolute;
      top: 4px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      background: var(--primary);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    @media (max-width: 768px) {
      .layout { flex-direction: column; height: auto; border-radius: 0; margin: 0; }
      .servers, .channels, .members { display: none; }
      .mobile-nav { display: flex; position: relative; margin-top: 16px; }
    }
  </style>
</head>
<body>
  <h1>Navigation</h1>
  
  <div class="layout">
    <div class="servers">
      <div class="server active"><span class="server-indicator"></span>🏠</div>
      <div class="server-divider"></div>
      <div class="server"><span class="server-indicator"></span>🎮</div>
      <div class="server"><span class="server-indicator"></span>💼</div>
      <div class="server"><span class="server-indicator"></span>🤖</div>
      <div style="flex:1"></div>
      <div class="server add">+</div>
    </div>
    
    <div class="channels">
      <div class="channel-header">虾豆社区</div>
      <div class="channel-list">
        <div class="category">
          <div class="category-title">文字频道</div>
          <div class="channel active">
            <span class="channel-icon">#</span>
            <span class="channel-name">general</span>
          </div>
          <div class="channel unread">
            <span class="channel-icon">#</span>
            <span class="channel-name">开发讨论</span>
            <span class="channel-unread"></span>
          </div>
          <div class="channel">
            <span class="channel-icon">#</span>
            <span class="channel-name">设计反馈</span>
            <span class="channel-badge">3</span>
          </div>
        </div>
        <div class="category">
          <div class="category-title">语音频道</div>
          <div class="channel">
            <span class="channel-icon">🔊</span>
            <span class="channel-name">会议室</span>
          </div>
        </div>
      </div>
      <div class="user-panel">
        <div class="user-avatar">🐱<span class="user-status"></span></div>
        <div class="user-info">
          <div class="user-name">彭猫</div>
          <div class="user-status-text">在线</div>
        </div>
        <div class="user-btns">
          <button class="user-btn">🎤</button>
          <button class="user-btn">⚙️</button>
        </div>
      </div>
    </div>
    
    <div class="main">
      <div class="main-header">general</div>
      <div class="main-body">
        <div style="text-align:center;">
          <div style="font-size:48px; margin-bottom:12px;">💬</div>
          <div>选择频道开始聊天</div>
        </div>
      </div>
    </div>
    
    <div class="members">
      <div class="member-category">在线 — 4</div>
      <div class="member online">
        <div class="member-avatar">🐱<span class="member-status status-online"></span></div>
        <span class="member-name">彭猫</span>
      </div>
      <div class="member online">
        <div class="member-avatar">🦊<span class="member-status status-online"></span></div>
        <span class="member-name">小炸</span>
      </div>
      <div class="member online">
        <div class="member-avatar">🤖<span class="member-status status-idle"></span></div>
        <span class="member-name" style="color: var(--primary-light);">AI Assistant</span>
      </div>
      <div class="member-category" style="margin-top:16px;">离线 — 12</div>
      <div class="member">
        <div class="member-avatar" style="opacity:0.5;"><span class="member-status status-offline"></span></div>
        <span class="member-name">其他用户</span>
      </div>
    </div>
  </div>
  
  <!-- Mobile -->
  <h1 style="margin-top:48px;">Mobile Navigation</h1>
  <div style="background: var(--surface); padding: 48px 24px; border-radius: var(--radius-lg); max-width: 400px; margin: 0 24px;">
    <div style="text-align:center; color: var(--text-muted); padding: 40px 0;">内容区域</div>
    <nav class="mobile-nav" style="position:relative; margin-top:24px;">
      <a class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">首页</span></a>
      <a class="nav-item"><span class="nav-icon">💬</span><span class="nav-label">消息</span><span class="nav-badge">5</span></a>
      <a class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">我的</span></a>
      <a class="nav-item"><span class="nav-icon">🔔</span><span class="nav-label">通知</span><span class="nav-badge">3</span></a>
      <a class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-label">设置</span></a>
    </nav>
  </div>
</body>
</html>
