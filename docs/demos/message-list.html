<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Design System - Messages</title>
  <style>
    :root {
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --primary-light: #818CF8;
      --bg: #0F0F10;
      --surface: #18181B;
      --elevated: #1F1F23;
      --border: #27272A;
      --border-light: #3F3F46;
      --text: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-muted: #71717A;
      --success: #22C55E;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --glow: 0 0 0 3px rgba(99, 102, 241, 0.3);
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, 'Inter', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    
    .chat {
      max-width: 600px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .chat-header::before {
      content: '#';
      color: var(--text-muted);
    }
    
    .messages {
      padding: 16px;
      min-height: 320px;
    }
    
    .msg {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-radius: var(--radius);
    }
    
    .msg:hover {
      background: rgba(255,255,255,0.02);
    }
    
    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
    }
    
    .msg-content { flex: 1; min-width: 0; }
    
    .msg-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    
    .msg-author {
      font-weight: 600;
      font-size: 15px;
    }
    
    .msg-author.ai {
      color: var(--primary-light);
    }
    
    .msg-time {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .msg-text {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .msg-text code {
      background: var(--elevated);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
    
    .msg-reactions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    
    .reaction {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 13px;
      cursor: pointer;
      transition: all 150ms;
    }
    
    .reaction:hover {
      border-color: var(--primary);
    }
    
    .reaction.active {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
    }
    
    .reaction-count {
      color: var(--text-muted);
      font-weight: 500;
    }
    
    /* Merged messages */
    .msg-merged {
      padding-left: 52px;
    }
    
    .msg-merged .msg-avatar {
      display: none;
    }
    
    /* Unread divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 16px 0;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--primary);
    }
    
    .divider-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Input */
    .chat-input {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    
    .input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
    }
    
    .input:focus {
      border-color: var(--primary);
      box-shadow: var(--glow);
    }
    
    .input::placeholder {
      color: var(--text-muted);
    }
    
    .input-tools {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    
    .tool-btn {
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text-muted);
      background: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .tool-btn:hover {
      background: var(--elevated);
      color: var(--text);
    }
    
    /* Typing */
    .typing {
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .typing-dots {
      display: flex;
      gap: 3px;
    }
    
    .typing-dots span {
      width: 5px;
      height: 5px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <h1>Messages</h1>
  
  <div class="chat">
    <div class="chat-header">general</div>
    
    <div class="messages">
      <div class="msg">
        <div class="msg-avatar">P</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author">彭猫</span>
            <span class="msg-time">今天 14:23</span>
          </div>
          <div class="msg-text">设计文档已更新，请查看</div>
          <div class="msg-reactions">
            <span class="reaction active">👍 <span class="reaction-count">3</span></span>
            <span class="reaction">✅ <span class="reaction-count">1</span></span>
          </div>
        </div>
      </div>
      
      <div class="msg">
        <div class="msg-avatar">🤖</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author ai">AI Assistant</span>
            <span class="badge" style="background: rgba(99,102,241,0.15); color: var(--primary-light); padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 4px;">AI</span>
            <span class="msg-time">今天 14:25</span>
          </div>
          <div class="msg-text">收到，正在分析文档...<br><br><code>/analyze</code> 命令已执行</div>
        </div>
      </div>
      
      <div class="divider"><span class="divider-text">新消息</span></div>
      
      <div class="msg">
        <div class="msg-avatar">小</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-author">小炸</span>
            <span class="msg-time">今天 14:30</span>
          </div>
          <div class="msg-text">颜色方案已精简，统一使用 Indigo 主色</div>
        </div>
      </div>
      
      <div class="msg msg-merged">
        <div class="msg-avatar"></div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-time">今天 14:31</span>
          </div>
          <div class="msg-text">移除了多余的强调色，整体更加简洁</div>
        </div>
      </div>
      
      <div class="msg msg-merged">
        <div class="msg-avatar"></div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-time">今天 14:32</span>
          </div>
          <div class="msg-text">Demo 文件也同步更新了 ✨</div>
          <div class="msg-reactions">
            <span class="reaction">🎉 <span class="reaction-count">2</span></span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="typing">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span>彭猫 正在输入...</span>
    </div>
    
    <div class="chat-input">
      <input class="input" placeholder="发送消息到 #general">
      <div class="input-tools">
        <button class="tool-btn">😊</button>
        <button class="tool-btn">📎</button>
        <button class="tool-btn">@</button>
      </div>
    </div>
  </div>
</body>
</html>
