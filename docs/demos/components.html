<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Design System - Components</title>
  <style>
    :root {
      /* Primary - Indigo */
      --primary: #6366F1;
      --primary-dark: #4F46E5;
      --primary-light: #818CF8;
      
      /* Neutrals */
      --bg: #0F0F10;
      --surface: #18181B;
      --elevated: #1F1F23;
      --border: #27272A;
      --border-light: #3F3F46;
      
      /* Text */
      --text: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-muted: #71717A;
      
      /* Semantic */
      --success: #22C55E;
      --warning: #EAB308;
      --error: #EF4444;
      
      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      
      /* Radius */
      --radius: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      
      /* Shadows */
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
      --glow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, 'Inter', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: var(--space-8);
      max-width: 900px;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: var(--space-8);
      color: var(--text);
    }
    
    h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: var(--space-8) 0 var(--space-4);
    }
    
    .section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
    }
    
    .row {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      align-items: center;
    }
    
    /* Colors */
    .colors {
      display: flex;
      gap: var(--space-2);
    }
    
    .color {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--space-1);
      font-size: 10px;
      font-family: monospace;
    }
    
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 150ms ease;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
      box-shadow: var(--glow);
    }
    
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    .btn-secondary {
      background: var(--elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      border-color: var(--border-light);
    }
    
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    
    .btn-ghost:hover {
      background: var(--elevated);
      color: var(--text);
    }
    
    .btn-danger {
      background: var(--error);
      color: white;
    }
    
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-lg { padding: 12px 24px; font-size: 15px; }
    
    /* Inputs */
    .input-group { margin-bottom: var(--space-4); }
    
    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }
    
    .input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: all 150ms ease;
    }
    
    .input::placeholder { color: var(--text-muted); }
    
    .input:hover { border-color: var(--border-light); }
    
    .input:focus {
      border-color: var(--primary);
      box-shadow: var(--glow);
    }
    
    .input-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: var(--space-1);
    }
    
    .input-error {
      font-size: 12px;
      color: var(--error);
      margin-top: var(--space-1);
    }
    
    /* Cards */
    .card {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      transition: all 150ms ease;
    }
    
    .card:hover {
      border-color: var(--border-light);
      transform: translateY(-2px);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }
    
    .card-title {
      font-weight: 600;
      font-size: 15px;
    }
    
    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    /* Avatar */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: white;
      position: relative;
    }
    
    .avatar-sm { width: 32px; height: 32px; font-size: 12px; }
    .avatar-lg { width: 48px; height: 48px; font-size: 16px; }
    
    .avatar-status {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      border-radius: var(--radius-full);
      border: 2px solid var(--elevated);
    }
    
    .status-online { background: var(--success); }
    .status-idle { background: var(--warning); }
    .status-offline { background: var(--text-muted); }
    
    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-full);
      background: rgba(99, 102, 241, 0.15);
      color: var(--primary-light);
    }
    
    /* Toggle */
    .toggle {
      width: 44px;
      height: 24px;
      background: var(--border);
      border-radius: var(--radius-full);
      position: relative;
      cursor: pointer;
      transition: background 150ms;
    }
    
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: var(--text);
      border-radius: var(--radius-full);
      transition: left 150ms;
    }
    
    .toggle.active {
      background: var(--primary);
    }
    
    .toggle.active::after {
      left: 23px;
    }
    
    /* Grid for cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-4);
    }
  </style>
</head>
<body>
  <h1>Shadow Components</h1>
  
  <h2>Brand Colors</h2>
  <div class="section">
    <div class="colors">
      <div class="color" style="background: #6366F1; color: white;">Primary</div>
      <div class="color" style="background: #4F46E5; color: white;">Dark</div>
      <div class="color" style="background: #818CF8; color: white;">Light</div>
      <div class="color" style="background: #0F0F10; border: 1px solid #27272A; color: #71717A;">BG</div>
      <div class="color" style="background: #18181B; color: #71717A;">Surface</div>
      <div class="color" style="background: #22C55E; color: white;">Success</div>
      <div class="color" style="background: #EF4444; color: white;">Error</div>
    </div>
  </div>
  
  <h2>Buttons</h2>
  <div class="section">
    <div class="row">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-secondary">Secondary</button>
      <button class="btn btn-ghost">Ghost</button>
      <button class="btn btn-danger">Delete</button>
    </div>
    <br><br>
    <div class="row">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary">Default</button>
      <button class="btn btn-primary btn-lg">Large</button>
    </div>
  </div>
  
  <h2>Inputs</h2>
  <div class="section">
    <div style="max-width: 320px;">
      <div class="input-group">
        <label class="input-label">Username</label>
        <input class="input" placeholder="Enter username">
        <p class="input-hint">Your public display name</p>
      </div>
      <div class="input-group">
        <label class="input-label">Email</label>
        <input class="input" value="invalid" style="border-color: var(--error);">
        <p class="input-error">Please enter a valid email</p>
      </div>
    </div>
  </div>
  
  <h2>Cards</h2>
  <div class="section">
    <div class="card-grid">
      <div class="card">
        <div class="card-header">
          <div class="avatar">S</div>
          <div>
            <div class="card-title">Server</div>
            <div class="card-desc">Manage settings</div>
          </div>
        </div>
        <button class="btn btn-secondary" style="width: 100%;">Configure</button>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="avatar">🤖</div>
          <div>
            <div class="card-title">AI Agent</div>
            <div class="card-desc">Your assistant</div>
          </div>
        </div>
        <button class="btn btn-primary" style="width: 100%;">Start Chat</button>
      </div>
    </div>
  </div>
  
  <h2>Avatars</h2>
  <div class="section">
    <div class="row">
      <div class="avatar avatar-sm">A</div>
      <div class="avatar">B</div>
      <div class="avatar avatar-lg">C</div>
      <div class="avatar"><span class="avatar-status status-online"></span>D</div>
      <div class="avatar"><span class="avatar-status status-idle"></span>E</div>
      <div class="avatar"><span class="avatar-status status-offline"></span>F</div>
    </div>
  </div>
  
  <h2>Badges</h2>
  <div class="section">
    <div class="row">
      <span class="badge">Pro</span>
      <span class="badge">New</span>
      <span class="badge">🤖 AI</span>
    </div>
  </div>
  
  <h2>Toggle</h2>
  <div class="section">
    <div class="row">
      <div class="toggle" onclick="this.classList.toggle('active')"></div>
      <div class="toggle active" onclick="this.classList.toggle('active')"></div>
    </div>
  </div>
</body>
</html>
